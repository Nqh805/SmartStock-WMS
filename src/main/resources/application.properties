# 1. Cấu hình kết nối MySQL 
# Thay 'localhost:3306' bằng địa chỉ IP nếu DB ở máy khác
spring.datasource.url=jdbc:mysql://localhost:3306/wms?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=1234

# 2. Driver cho MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Cấu hình JPA / Hibernate
# 'update': Tự động tạo bảng hoặc cập nhật thêm cột mới mà KHÔNG xóa dữ liệu cũ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Tên ứng dụng
spring.application.name=demo

# 5. Cấu hình Flyway cho database migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

