<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: html_head}"></head>
  <body class="supplier-page overflow-hidden">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="d-flex overflow-hidden" style="height: calc(100vh - 56px)">
      <div th:replace="~{fragments :: sidebar}"></div>

      <main class="flex-grow-1 p-4 overflow-y-auto bg-light h-100">
        <div
          th:if="${errorMessage}"
          class="alert alert-danger alert-dismissible fade show mb-4 shadow-sm"
          role="alert"
        >
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span th:text="${errorMessage}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h1
              th:text="${supplier.id != null ? 'Cập Nhật Nhà Cung Cấp' : 'Thêm Nhà Cung Cấp Mới'}"
            ></h1>
            <p
              class="text-muted mb-0"
              th:text="${supplier.id != null ? 'Chỉnh sửa thông tin đối tác cung ứng.' : 'Tạo mới hồ sơ nhà cung cấp thiết bị, linh kiện.'}"
            ></p>
          </div>
        </div>
        <hr />

        <form
          th:action="${supplier.id != null} ? @{/suppliers/edit/{id}(id=${supplier.id})} : @{/suppliers/add}"
          th:object="${supplier}"
          method="post"
        >
          <input
            type="hidden"
            th:field="*{id}"
            th:if="${supplier.id != null}"
          />

          <div
            class="card p-4 shadow-sm border-0 bg-white mx-auto"
            style="max-width: 800px; margin-top: 20px"
          >
            <h5 class="fw-bold text-primary mb-4 border-bottom pb-2">
              <i class="bi bi-building me-2"></i>Thông tin hồ sơ nhà cung cấp
            </h5>

            <div class="row mb-3">
              <div class="col-md-7">
                <label for="name" class="form-label fw-semibold"
                  >Tên nhà cung cấp <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  id="name"
                  th:field="*{name}"
                  class="form-control form-control-lg fs-6"
                  placeholder="Nhập tên doanh nghiệp..."
                  required
                />
              </div>
              <div class="col-md-5">
                <label for="taxCode" class="form-label fw-semibold"
                  >Mã số thuế</label
                >
                <input
                  type="text"
                  id="taxCode"
                  th:field="*{taxCode}"
                  class="form-control form-control-lg fs-6 font-monospace"
                  placeholder="VD: 0101234567"
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="phone" class="form-label fw-semibold"
                  >Số điện thoại liên hệ
                  <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  id="phone"
                  th:field="*{phone}"
                  class="form-control"
                  placeholder="Hotline hoặc SĐT đại diện..."
                  required
                />
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label fw-semibold"
                  >Địa chỉ Email</label
                >
                <input
                  type="email"
                  id="email"
                  th:field="*{email}"
                  class="form-control"
                  placeholder="ví dụ: contact@supplier.com..."
                />
              </div>
            </div>

            <div class="mb-3">
              <label for="address" class="form-label fw-semibold"
                >Địa chỉ văn phòng / Kho hàng</label
              >
              <input
                type="text"
                id="address"
                th:field="*{address}"
                class="form-control"
                placeholder="Số nhà, đường, phường/xã, quận/huyện..."
              />
            </div>

            <div class="mb-5" th:if="${supplier.id != null}">
              <label class="form-label fw-semibold">Trạng thái hợp tác</label>
              <select th:field="*{supplierStatus}" class="form-select w-50">
                <option value="ACTIVE">Hoạt động (Đang hợp tác)</option>
                <option value="INACTIVE">Tạm ngừng</option>
                <option value="SUSPENDED">Đình chỉ (Có vấn đề)</option>
                <option value="TERMINATED">Chấm dứt hợp tác</option>
              </select>
            </div>

            <input
              type="hidden"
              name="supplierStatus"
              value="ACTIVE"
              th:if="${supplier.id == null}"
            />

            <div class="pt-3 border-top d-flex justify-content-end">
              <button
                class="btn btn-secondary px-4 me-2"
                type="button"
                onclick="window.location.href = '/suppliers/view'"
              >
                Hủy bỏ
              </button>
              <button type="submit" class="btn btn-success px-5 fw-bold shadow">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span
                  th:text="${supplier.id != null ? 'CẬP NHẬT THÔNG TIN' : 'LƯU THÔNG TIN'}"
                  >LƯU THÔNG TIN</span
                >
              </button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    @Query("SELECT DISTINCT t FROM StockTransfer t " +
            "JOIN FETCH t.fromWarehouse " +
            "JOIN FETCH t.toWarehouse " +
            "LEFT JOIN FETCH t.importBatches " +
            "ORDER BY t.createdDate DESC, t.id DESC")
    List<StockTransfer> findAllWithWarehouses();
  </body>
</html>
