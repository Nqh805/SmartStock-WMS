<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:insert="~{fragments :: html_head}"></head>
  <body class="bg-light overflow-hidden">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="d-flex overflow-hidden" style="height: calc(100vh - 56px)">
      <div th:replace="~{fragments :: sidebar}"></div>

      <main class="flex-grow-1 p-4 overflow-y-auto h-100">
        <a
          th:href="@{/accounts/manage}"
          class="text-decoration-none text-muted mb-3 d-inline-block fw-semibold"
        >
          <i class="bi bi-arrow-left me-1"></i>Quay lại danh sách
        </a>

        <div class="d-flex justify-content-between align-items-end mb-3">
          <div>
            <h2
              th:text="${accountDTO.employeeId == null ? 'Tạo Tài khoản mới' : 'Cập nhật Tài khoản'}"
            ></h2>
            <p class="text-muted mb-0">
              Thiết lập quyền truy cập và thông tin nhân sự.
            </p>
          </div>
        </div>

        <div class="row">
          <div class="col-xl-10">
            <div class="card shadow-sm border-0">
              <form
                th:action="@{${accountDTO.employeeId == null ? '/accounts/add' : '/accounts/update'}}"
                method="post"
              >
                <input type="hidden" th:field="*{accountDTO.employeeId}" />
                <input type="hidden" th:field="*{accountDTO.userId}" />

                <div class="card-body p-4">
                  <h5 class="fw-bold text-primary mb-3 border-bottom pb-2">
                    <i class="bi bi-shield-lock me-2"></i>Bảo mật & Phân quyền
                  </h5>
                  <div class="row g-4 mb-5">
                    <div class="col-md-6">
                      <label class="form-label fw-bold"
                        >Tên đăng nhập <span class="text-danger">*</span></label
                      >
                      <input
                        type="text"
                        th:field="*{accountDTO.username}"
                        class="form-control bg-light"
                        required
                        th:readonly="${accountDTO.employeeId != null}"
                      />
                    </div>

                    <div class="col-md-6">
                      <label class="form-label fw-bold"
                        >Mật khẩu
                        <span
                          class="text-danger"
                          th:if="${accountDTO.employeeId == null}"
                          >*</span
                        ></label
                      >
                      <input
                        type="password"
                        th:field="*{accountDTO.password}"
                        class="form-control"
                        th:required="${accountDTO.employeeId == null}"
                        th:placeholder="${accountDTO.employeeId != null ? 'Bỏ trống nếu không muốn đổi mật khẩu' : 'Nhập mật khẩu'}"
                      />
                    </div>

                    <div class="col-md-6">
                      <label class="form-label fw-bold"
                        >Phân quyền (Role)
                        <span class="text-danger">*</span></label
                      >
                      <select
                        th:field="*{accountDTO.roleId}"
                        class="form-select border-primary"
                        required
                      >
                        <option value="" disabled selected>
                          -- Chọn chức vụ --
                        </option>
                        <option
                          th:each="r : ${roles}"
                          th:value="${r.id}"
                          th:text="${r.description}"
                        ></option>
                      </select>
                    </div>

                    <div class="col-md-6">
                      <label class="form-label fw-bold"
                        >Trạng thái <span class="text-danger">*</span></label
                      >
                      <select
                        th:field="*{accountDTO.status}"
                        class="form-select"
                        required
                      >
                        <option value="ACTIVE">Hoạt động bình thường</option>
                        <option value="INACTIVE">Đã khóa</option>
                      </select>
                    </div>
                  </div>

                  <h5 class="fw-bold text-success mb-3 border-bottom pb-2">
                    <i class="bi bi-person-badge me-2"></i>Thông tin Nhân sự
                  </h5>
                  <div class="row g-4">
                    <div class="col-md-12">
                      <label class="form-label fw-bold"
                        >Họ và tên nhân viên
                        <span class="text-danger">*</span></label
                      >
                      <input
                        type="text"
                        th:field="*{accountDTO.fullName}"
                        class="form-control"
                        required
                      />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label fw-bold">Số điện thoại</label>
                      <input
                        type="text"
                        th:field="*{accountDTO.phone}"
                        class="form-control"
                      />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label fw-bold">Email</label>
                      <input
                        type="email"
                        th:field="*{accountDTO.email}"
                        class="form-control"
                      />
                    </div>

                    <div class="col-md-4">
                      <label class="form-label fw-bold text-success"
                        >Nơi làm việc (Kho hàng)</label
                      >
                      <select
                        th:field="*{accountDTO.wareHouseId}"
                        class="form-select border-success"
                      >
                        <option value="">
                          -- Chưa điều động / Toàn hệ thống --
                        </option>
                        <option
                          th:each="w : ${warehouses}"
                          th:value="${w.id}"
                          th:text="${w.name}"
                        ></option>
                      </select>
                    </div>
                  </div>
                </div>
                <div class="card-footer bg-light p-3 text-end">
                  <a
                    th:href="@{/accounts/manage}"
                    class="btn btn-secondary px-4 me-2"
                    >Hủy bỏ</a
                  >
                  <button type="submit" class="btn btn-primary fw-bold px-5">
                    <i class="bi bi-save me-2"></i
                    ><span
                      th:text="${accountDTO.employeeId == null ? 'Lưu & Tạo mới' : 'Cập nhật dữ liệu'}"
                    ></span>
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
  </body>
</html>
