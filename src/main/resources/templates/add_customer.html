<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: html_head}"></head>
  <body class="customer-page overflow-hidden">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="d-flex overflow-hidden" style="height: calc(100vh - 56px)">
      <div th:replace="~{fragments :: sidebar}"></div>

      <main class="flex-grow-1 p-4 overflow-y-auto bg-light h-100">
        <div
          th:if="${errorMessage}"
          class="alert alert-danger alert-dismissible fade show mb-4 shadow-sm"
          role="alert"
        >
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span th:text="${errorMessage}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h1
              th:text="${customer.id != null ? 'Cập Nhật Khách Hàng' : 'Thêm Khách Hàng Mới'}"
            ></h1>
            <p
              class="text-muted mb-0"
              th:text="${customer.id != null ? 'Chỉnh sửa thông tin hồ sơ của khách hàng.' : 'Tạo mới hồ sơ khách hàng lẻ hoặc đối tác đại lý, doanh nghiệp.'}"
            ></p>
          </div>
        </div>
        <hr />

        <form
          th:action="${customer.id != null} ? @{/customers/edit/{id}(id=${customer.id})} : @{/customers/add}"
          th:object="${customer}"
          method="post"
        >
          <input
            type="hidden"
            th:field="*{id}"
            th:if="${customer.id != null}"
          />
          <div
            class="card p-4 shadow-sm border-0 bg-white mx-auto"
            style="max-width: 800px; margin-top: 20px"
          >
            <h5 class="fw-bold text-primary mb-4 border-bottom pb-2">
              <i class="bi bi-person-lines-fill me-2"></i>Thông tin hồ sơ khách
              hàng
            </h5>

            <div class="row mb-3">
              <div class="col-md-7">
                <label for="name" class="form-label fw-semibold"
                  >Tên khách hàng <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  id="name"
                  th:field="*{name}"
                  class="form-control form-control-lg fs-6"
                  placeholder="Nhập họ tên hoặc tên tổ chức..."
                  required
                />
              </div>
              <div class="col-md-5">
                <label for="type" class="form-label fw-semibold"
                  >Phân loại đối tác <span class="text-danger">*</span></label
                >
                <select
                  id="type"
                  th:field="*{type}"
                  class="form-select form-select-lg fs-6"
                  required
                >
                  <option value="INDIVIDUAL">Khách lẻ (Cá nhân)</option>
                  <option value="BUSINESS">Doanh nghiệp / Đại lý</option>
                </select>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="phone" class="form-label fw-semibold"
                  >Số điện thoại <span class="text-danger">*</span></label
                >
                <input
                  type="text"
                  id="phone"
                  th:field="*{phone}"
                  class="form-control"
                  placeholder="Nhập số điện thoại di động..."
                  required
                />
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label fw-semibold"
                  >Địa chỉ Email</label
                >
                <input
                  type="email"
                  id="email"
                  th:field="*{email}"
                  class="form-control"
                  placeholder="ví dụ: contact@example.com..."
                />
              </div>
            </div>

            <div class="mb-5">
              <label for="address" class="form-label fw-semibold"
                >Địa chỉ chi tiết</label
              >
              <input
                type="text"
                id="address"
                th:field="*{address}"
                class="form-control"
                placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."
              />
            </div>

            <div class="pt-3 border-top d-flex justify-content-end">
              <button
                class="btn btn-secondary px-4 me-2"
                type="button"
                onclick="goBackOrClose()"
              >
                Hủy bỏ
              </button>
              <button type="submit" class="btn btn-success px-5 fw-bold shadow">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span
                  th:text="${customer.id != null ? 'CẬP NHẬT THÔNG TIN' : 'LƯU THÔNG TIN'}"
                  >LƯU THÔNG TIN</span
                >
              </button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>

    <script>
      function goBackOrClose() {
        // Nếu cửa sổ này được bật lên từ tab khác (Ví dụ: từ trang POS Sales)
        if (window.opener && !window.closed) {
          window.close(); // Đóng tab
        } else {
          // Nếu được mở bình thường trên cùng 1 tab
          window.location.href = "/customers/view"; // Về lại danh sách
        }
      }
    </script>
  </body>
</html>
