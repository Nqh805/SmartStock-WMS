<!doctype html>
<html lang="vi">
  <head th:insert="~{fragments :: html_head}"></head>

  <body class="login-page">
    <div class="login-layout">
      <div class="login-card">
        <h3 class="text-center mb-4">Đăng nhập</h3>

        <form th:action="@{/process_login}" method="post">
          <div
            th:if="${param.error}"
            class="alert alert-danger p-2 text-center small"
          >
            Sai tên đăng nhập hoặc mật khẩu!
          </div>
          <div
            th:if="${param.logout}"
            class="alert alert-success p-2 text-center small"
          >
            Đã đăng xuất thành công.
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Tên đăng nhập</label>
            <input
              type="text"
              class="form-control"
              name="username"
              id="username"
              placeholder="Nhập username..."
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input
              type="password"
              class="form-control"
              name="password"
              id="password"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>
          <div class="remember-row mb-4">
            <label class="checkbox-group">
              <input type="checkbox" name="remember-me" /> Ghi nhớ đăng nhập
            </label>
            <a th:href="@{/reset_password}" class="forgot-link"
              >Quên mật khẩu?</a
            >
          </div>

          <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>
      </div>

      <div class="login-card image-card" aria-label="Logo của công ty">
        <img src="./asset/logo.png" alt="Logo của công ty" />
      </div>
    </div>

    <!-- Bootstrap JS (tuỳ chọn) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
